<!DOCTYPE html>
<html>
<head>
    <title>🤖 Chatbot Kaggle</title>
    <style>
        /* Stesso CSS di prima */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.5rem; }
        .header-info { font-size: 0.8rem; opacity: 0.9; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 75%;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        .message.bot {
            background: white;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .message .timestamp {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        .input-container input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .input-container input:focus { border-color: #667eea; }
        .input-container button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .input-container button:hover { transform: scale(1.05); }
        .input-container button:active { transform: scale(0.95); }
        .status {
            padding: 10px 20px;
            background: #e3f2fd;
            font-size: 0.8rem;
            color: #1976d2;
            display: flex;
            justify-content: space-between;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .offline {
            background: #f8d7da !important;
            color: #721c24 !important;
        }
        .online {
            background: #d4edda !important;
            color: #155724 !important;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>🧠 Chatbot Kaggle</h1>
            <div class="header-info">
                <span id="status-badge">🔄 Connessione...</span>
            </div>
        </div>
        
        <div class="status" id="status-bar">
            <span>💬 Server: <span id="server-status">Sconosciuto</span></span>
            <span id="message-count">0 messaggi</span>
        </div>
        
        <div class="messages" id="messages">
            <div class="message bot">
                🤖 Connesso al backend su Kaggle!
                <div class="timestamp">Ora</div>
            </div>
        </div>
        
        <div class="input-container">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Scrivi qualcosa..."
                onkeypress="if(event.key === 'Enter') sendMessage()"
            >
            <button id="send-btn" onclick="sendMessage()">Invia ➤</button>
        </div>
    </div>
    
    <script>
        // ============ INSERISCI L'URL DI KAGGLE ============
        const KAGGLE_URL = "https://il-tuo-nome.ngrok.io";  // ← SOSTITUISCI!
        const API_URL = KAGGLE_URL;
        
        let messageCount = 1;
        let isConnected = false;
        
        // ============ FUNZIONI ============
        async function sendMessage(message = null) {
            const input = document.getElementById('user-input');
            const text = message || input.value.trim();
            
            if (!text) return;
            
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;
            sendBtn.textContent = '⏳';
            
            addMessage(text, 'user');
            input.value = '';
            
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: text,
                        user_id: 'user123'
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Risposta:', data);
                
                addMessage(data.response || 'Scusa, errore', 'bot');
                
                messageCount++;
                document.getElementById('message-count').textContent = 
                    `${messageCount} messaggi`;
                
            } catch (error) {
                console.error('Errore:', error);
                addMessage('❌ Errore di connessione al server Kaggle', 'bot');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Invia ➤';
                input.focus();
            }
        }
        
        function addMessage(text, sender) {
            const messages = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const time = new Date().toLocaleTimeString('it-IT');
            messageDiv.innerHTML = `${text}<div class="timestamp">${time}</div>`;
            
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
        }
        
        // ============ TEST CONNESSIONE ============
        async function testConnection() {
            const statusBadge = document.getElementById('status-badge');
            const serverStatus = document.getElementById('server-status');
            
            try {
                const response = await fetch(`${API_URL}/ping`);
                if (response.ok) {
                    isConnected = true;
                    statusBadge.textContent = '✅ Online';
                    statusBadge.style.color = '#155724';
                    serverStatus.textContent = '🟢 Connesso';
                    document.getElementById('status-bar').className = 'status online';
                } else {
                    throw new Error('Risposta non OK');
                }
            } catch (error) {
                isConnected = false;
                statusBadge.textContent = '❌ Offline';
                statusBadge.style.color = '#721c24';
                serverStatus.textContent = '🔴 Disconnesso';
                document.getElementById('status-bar').className = 'status offline';
                console.warn('Server non raggiungibile:', error);
            }
        }
        
        // ============ OTTIENI INFO MODELLI ============
        async function getModels() {
            try {
                const response = await fetch(`${API_URL}/models`);
                if (response.ok) {
                    const data = await response.json();
                    console.log('Modelli attivi:', data.models);
                }
            } catch (error) {
                console.warn('Impossibile ottenere info modelli');
            }
        }
        
        // ============ AVVIA ============
        document.getElementById('user-input').focus();
        
        // Test connessione ogni 10 secondi
        testConnection();
        getModels();
        setInterval(testConnection, 10000);
        
        console.log('🚀 Chatbot connesso a:', API_URL);
        console.log('💡 Assicurati che il notebook Kaggle sia in esecuzione!');
    </script>
</body>
</html>
